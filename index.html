<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yoru.exe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="noise"></div>

<div class="center glitch-wrapper">

  <h1 class="glitch" data-text="yoru">yoru</h1>

  <p class="type" id="type"></p>

  <div class="links">
    <a href="/scuffed-snake/">🐍 scuffed snake</a>
    <a href="https://github.com/yourusername" target="_blank">github</a>
  </div>

  <div class="status">
    <p>☕ caffeine: overflow</p>
    <p>🧠 brain: segmentation fault</p>
    <p>⚙️ status: unstable</p>
  </div>

</div>

<script>
const text = "chaotic overcaffeinated mess...";
let i = 0;
const speed = 40;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("type").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, speed);
  }
}

typeWriter();
</script>

</body>
