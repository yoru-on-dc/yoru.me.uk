<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yoru.exe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="noise"></div>

<div class="center">

  <h1 class="glitch" data-text="yoru">yoru</h1>

  <p class="type" id="type"></p>

  <div class="links">
    <a href="https://github.com/yourusername" target="_blank">github</a>
    <a href="#">projects</a>
    <a href="#">contact</a>
  </div>

  <div class="status">
    <p>☕ caffeine: overflow</p>
    <p>🧠 brain: segmentation fault</p>
    <p>⚙️ status: unstable</p>
  </div>

</div>

<script>
const text = [
  "booting yoru.exe...",
  "loading chaos module...",
  "injecting caffeine...",
  "chaotic overcaffeinated mess"
];

let line = 0;
let char = 0;
const speed = 40;
const el = document.getElementById("type");

function type() {
  if (line < text.length) {
    if (char < text[line].length) {
      el.innerHTML += text[line].charAt(char);
      char++;
      setTimeout(type, speed);
    } else {
      el.innerHTML += "<br>";
      line++;
      char = 0;
      setTimeout(type, 300);
    }
  }
}

type();
</script>

</body>
</html>
